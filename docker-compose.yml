services:
  backend:
    build: ./backend
    container_name: chat-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: chat-frontend
    ports:
      - "5173:80" # Map host 5173 to container 80 (nginx)
    env_file:
      - ./frontend/.env
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: chat-redis
    ports:
      - "6379:6379"
    restart: unless-stopped