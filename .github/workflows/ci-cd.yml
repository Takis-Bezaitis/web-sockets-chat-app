name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install backend dependencies
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      # 4️⃣ Build backend (if needed, e.g., TypeScript)
      - name: Build backend
        working-directory: ./backend
        run: npm run build

      # 5️⃣ Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # 6️⃣ Build frontend
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # 7️⃣ (Optional) Run tests
      - name: Run backend tests
        working-directory: ./backend
        run: npm test || echo "No tests configured"

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test || echo "No tests configured"

    env:
      # Backend secrets
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PORT: ${{ secrets.PORT }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
      REDIS_URL: ${{ secrets.REDIS_URL }}

      # Frontend secrets
      VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
      VITE_BACKEND_AUTH_BASE_URL: ${{ secrets.VITE_BACKEND_AUTH_BASE_URL }}
      VITE_BACKEND_AUTH_LOGIN_URL: ${{ secrets.VITE_BACKEND_AUTH_LOGIN_URL }}
      VITE_BACKEND_AUTH_ME_URL: ${{ secrets.VITE_BACKEND_AUTH_ME_URL }}
      VITE_BACKEND_ROOMS_BASE_URL: ${{ secrets.VITE_BACKEND_ROOMS_BASE_URL }}
      VITE_BACKEND_MESSAGES_BASE_URL: ${{ secrets.VITE_BACKEND_MESSAGES_BASE_URL }}
      VITE_BACKEND_USERS_BASE_URL: ${{ secrets.VITE_BACKEND_USERS_BASE_URL }}
      VITE_BACKEND_INVITATIONS_BASE_URL: ${{ secrets.VITE_BACKEND_INVITATIONS_BASE_URL }}