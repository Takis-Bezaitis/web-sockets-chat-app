name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Run backend tests
        working-directory: ./backend
        run: |
          if npm run | grep -q "test"; then
            npm test
          else
            echo "No backend tests configured"
          fi

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PORT: ${{ secrets.PORT }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
      REDIS_URL: ${{ secrets.REDIS_URL }}

  frontend:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: ./frontend
        run: |
          if npm run | grep -q "test"; then
            npm test
          else
            echo "No frontend tests configured"
          fi

    env:
      VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
      VITE_BACKEND_AUTH_BASE_URL: ${{ secrets.VITE_BACKEND_AUTH_BASE_URL }}
      VITE_BACKEND_AUTH_LOGIN_URL: ${{ secrets.VITE_BACKEND_AUTH_LOGIN_URL }}
      VITE_BACKEND_AUTH_ME_URL: ${{ secrets.VITE_BACKEND_AUTH_ME_URL }}
      VITE_BACKEND_ROOMS_BASE_URL: ${{ secrets.VITE_BACKEND_ROOMS_BASE_URL }}
      VITE_BACKEND_MESSAGES_BASE_URL: ${{ secrets.VITE_BACKEND_MESSAGES_BASE_URL }}
      VITE_BACKEND_USERS_BASE_URL: ${{ secrets.VITE_BACKEND_USERS_BASE_URL }}
      VITE_BACKEND_INVITATIONS_BASE_URL: ${{ secrets.VITE_BACKEND_INVITATIONS_BASE_URL }}